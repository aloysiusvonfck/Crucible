name: Compile Kotlin Module

on:
  repository_dispatch:
    types: [compile-module]
  workflow_dispatch:
    inputs:
      code:
        description: 'Kotlin code to compile'
        required: true
        type: string
      file_name:
        description: 'Filename (e.g., main.kt)'
        required: true
        default: 'main.kt'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base project
        uses: actions/checkout@v4
        with:
          repository: aloysiusvonfck/Crucible-Template
          ref: main # Or your template repo

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Inject User Code
        run: |
          mkdir -p app/src/main/java/com/nexus/module
          echo "${{ github.event.inputs.code || github.event.client_payload.code }}" > app/src/main/java/com/nexus/module/${{ github.event.inputs.file_name || github.event.client_payload.file_name || 'main.kt' }}
          
          # If using workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "${{ github.event.inputs.code }}" > app/src/main/java/com/nexus/module/${{ github.event.inputs.file_name }}
          fi

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: compiled-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Return Artifact URL
        id: artifact
        run: |
          # In a real scenario, you'd use the Actions API to get the download URL
          # For now, we just log success
          echo "Build successful. APK available in artifacts."
          echo "url=compiled-apk" >> $GITHUB_OUTPUT
